<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>文章标题 - 个人简历</title>
  <style>
    /* 简单排版，让文章好看点 */
    .article-container { max-width: 800px; margin: 50px auto; padding: 0 20px; }
    .article-title { font-size: 28px; margin-bottom: 10px; }
    .article-date { color: #666; margin-bottom: 30px; }
    .article-content { line-height: 1.8; font-size: 16px; }
  </style>
</head>
<body>
  <div class="article-container">
    <!-- 文章标题 -->
    <h1 class="article-title">我的第一篇文章</h1>
    <!-- 发布时间 -->
    <div class="article-date">2025-01-01</div>
    <!-- 文章内容 -->
    <div class="article-content">
      这里写你的文章正文<br>
      换行直接用<br>，段落用<p>段落内容</p>
    </div>
  </div>
</body>
</html>
