<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 个人简历</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .back {
            margin-bottom: 20px;
        }

        .back a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 15px;
        }

        .back a:hover {
            text-decoration: underline;
        }

        .title {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .date {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .content {
            font-size: 16px;
            line-height: 1.8;
        }

        .loading {
            text-align: center;
            padding: 50px 0;
            color: #6b7280;
        }
        .content h1, .content h2, .content h3 {
    margin: 20px 0 10px;
    font-weight: 600;
}
.content p {
    margin-bottom: 16px;
}
.content pre {
    background: #f6f8fa;
    padding: 16px;
    border-radius: 8px;
    overflow: auto;
}
.content code {
    background: #f6f8fa;
    padding: 2px 6px;
    border-radius: 4px;
}
    </style>
    <!-- 引入 Markdown 解析库，把 GitHub 的 Issue 内容转成网页格式 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="back">
                <a href="index.html">← 返回主页</a>
            </div>
            <h1 class="title" id="title">文章加载中...</h1>
            <div class="date" id="date"></div>
            <div class="content" id="content">
                <div class="loading">正在加载文章内容...</div>
            </div>
        </div>
    </div>

    <script>
        // 这里改成你自己的 GitHub 信息，和主页保持一致！
        const GITHUB_USERNAME = 'weishuai168';
        const REPO_NAME = 'blog';

        // 获取 URL 里的文章ID
        const urlParams = new URLSearchParams(window.location.search);
        const issueId = urlParams.get('id');

        if (!issueId) {
            // 没有ID，直接显示错误
            document.getElementById("title").innerText = "文章不存在";
            document.getElementById("content").innerHTML = "<p>请从主页点击文章进入，或<a href='index.html'>返回主页</a></p>";
        } else {
            // 去 GitHub 拉取对应的 Issue 数据
            async function loadArticle() {
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues/${issueId}`, {
                        headers: {
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (!response.ok) throw new Error('请求失败');
                    const issue = await response.json();

                    // 解析数据并渲染到页面
                    const date = new Date(issue.created_at).toISOString().split('T')[0];
                    document.getElementById("title").innerText = issue.title;
                    document.getElementById("date").innerText = `发布于：${date}`;
                    // 把 Markdown 内容转成 HTML
                    document.getElementById("content").innerHTML = marked.parse(issue.body || "暂无内容");
                } catch (error) {
                    console.error('加载文章失败：', error);
                    document.getElementById("title").innerText = "文章加载失败";
                    document.getElementById("content").innerHTML = `
                        <p>无法加载文章内容，可能是：</p>
                        <ul>
                            <li>网络连接问题</li>
                            <li>文章ID错误</li>
                            <li>GitHub API 请求被限流</li>
                        </ul>
                        <p><a href='index.html'>返回主页查看其他文章</a></p>
                    `;
                }
            }

            loadArticle();
        }
    </script>
</body>
</html>
