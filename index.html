<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="laowei的个人博客">
    <title>laowei</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --meta-color: #6b7280;
            --tag-bg: rgba(37, 99, 235, 0.1);
            --tag-color: #2563eb;
            --hover-bg: rgba(37, 99, 235, 0.05);
            --search-bg: #f9fafb;
            --sidebar-border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .dark {
            --primary-color: #60a5fa;
            --text-color: #e5e7eb;
            --bg-color: #111827;
            --card-bg: #1f2937;
            --border-color: #374151;
            --meta-color: #9ca3af;
            --tag-bg: rgba(96, 165, 250, 0.15);
            --tag-color: #60a5fa;
            --hover-bg: rgba(96, 165, 250, 0.08);
            --search-bg: #1a2332;
            --sidebar-border: #374151;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            background: var(--card-bg);
            padding: 30px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: block;
            border: 3px solid var(--primary-color);
            background: var(--border-color);
            object-fit: cover;
        }

        .name {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .tag {
            text-align: center;
            color: var(--tag-color);
            font-size: 0.85rem;
            padding: 4px 12px;
            background: var(--tag-bg);
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .tag-wrapper {
            text-align: center;
            margin-bottom: 20px;
        }

        .info-list {
            list-style: none;
            font-size: 0.85rem;
            margin-bottom: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--sidebar-border);
        }

        .info-list li {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }

        .info-list li span:first-child {
            color: var(--meta-color);
        }

        .info-list li a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .info-list li a:hover {
            text-decoration: underline;
        }

        .sidebar-title {
            font-size: 15px;
            font-weight: bold;
            margin: 20px 0 10px 0;
            color: var(--primary-color);
        }

        .sidebar-desc {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-color);
        }

        /* ===== 主内容区 ===== */
        main {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            padding: 28px 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        h2 {
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            margin-bottom: 16px;
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* ===== 搜索栏 ===== */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--search-bg);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--primary-color);
        }

        .search-bar input::placeholder {
            color: var(--meta-color);
        }

        /* ===== 标签过滤 ===== */
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag-filter-btn {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: transparent;
            color: var(--meta-color);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .tag-filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* ===== 文章列表 ===== */
        .post-list {
            list-style: none;
        }

        .post-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
            padding-left: 12px;
            border-left: 3px solid transparent;
        }

        .post-item:hover {
            background: var(--hover-bg);
            border-left: 3px solid var(--primary-color);
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .post-date {
            color: var(--meta-color);
            font-size: 0.82rem;
        }

        .post-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .post-tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--tag-bg);
            color: var(--tag-color);
        }

        .post-title-link {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            display: block;
            margin: 4px 0;
            transition: color 0.2s;
        }

        .post-title-link:hover {
            color: var(--primary-color);
        }

        .post-excerpt {
            color: var(--meta-color);
            font-size: 0.88rem;
            line-height: 1.6;
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--meta-color);
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: var(--meta-color);
            font-size: 0.9rem;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 10px 0;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            min-width: 38px;
        }

        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .pagination-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== 主题切换按钮 ===== */
        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* ===== 回到顶部 ===== */
        .back-to-top {
            position: fixed;
            bottom: 80px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        .back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .back-to-top:hover {
            transform: scale(1.1);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .profile-img {
                width: 80px;
                height: 80px;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧侧边栏 -->
        <aside class="sidebar">
            <img class="profile-img" id="avatar" alt="头像">
            <div class="name" id="sidebar-name">加载中...</div>
            <div class="tag-wrapper">
                <span class="tag" id="sidebar-tag">Full Stack Developer</span>
            </div>
            <ul class="info-list">
                <li><span>位置</span><span id="location">中国</span></li>
                <li><span>博客</span><a href="https://weishuai168.github.io/blog/" target="_blank" id="blog-link">链接</a></li>
                <li><span>GitHub</span><a href="https://github.com/weishuai168" target="_blank" id="github-link">GitHub</a></li>
            </ul>
            <div class="sidebar-title">关于我</div>
            <p class="sidebar-desc" id="about">
                热爱前端开发、人工智能和开源技术。
                记录学习心得、技术分享和生活感悟。
            </p>
        </aside>

        <!-- 右侧主内容区 -->
        <main>
            <section class="card">
                <h2>文章列表</h2>

                <!-- 搜索栏 -->
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="🔍 搜索标题或正文...">
                </div>

                <!-- 标签过滤 -->
                <div class="tag-filter" id="tag-filter"></div>

                <!-- 文章列表 -->
                <ul class="post-list" id="post-container">
                    <li class="loading">正在加载文章</li>
                </ul>

                <!-- 分页容器 -->
                <div class="pagination" id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="theme-toggle" title="切换深色/浅色模式">🌙</button>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="back-to-top" title="回到顶部">↑</button>

    <script>
        // ===== GitHub 配置 =====
        const GITHUB_USERNAME = 'weishuai168';
        const REPO_NAME = 'blog';
        const PAGE_SIZE = 10;
        const CACHE_KEY = 'blog_issues_cache';
        const CACHE_DURATION = 24 * 60 * 60 * 1000; // 24 小时

        // ===== 状态 =====
        let currentPage = 1;
        let totalPages = 1;
        let allIssues = [];
        let filteredIssues = [];
        let activeTag = '';
        let searchQuery = '';

        // ===== 深色模式 =====
        (function initTheme() {
            const saved = localStorage.getItem('blog_theme');
            if (saved === 'dark') {
                document.body.classList.add('dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.classList.add('dark');
                document.getElementById('theme-toggle').textContent = '☀️';
            }
        })();

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('blog_theme', isDark ? 'dark' : 'light');
        });

        // ===== 回到顶部 =====
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('back-to-top');
            btn.classList.toggle('visible', window.scrollY > 300);
        });

        document.getElementById('back-to-top').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ===== 提取纯文本摘要 =====
        function getExcerpt(body, maxLength = 120) {
            if (!body) return '';
            // 移除 markdown 格式
            let text = body
                .replace(/```[\s\S]*?```/g, '[代码块]')
                .replace(/`([^`]+)`/g, '$1')
                .replace(/#{1,6}\s*/g, '')
                .replace(/\*\*([^*]+)\*\*/g, '$1')
                .replace(/\*([^*]+)\*/g, '$1')
                .replace(/!\[.*?\]\(.*?\)/g, '')
                .replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1')
                .replace(/[-*]\s/g, '')
                .replace(/\n+/g, ' ')
                .trim();
            if (text.length <= maxLength) return text;
            return text.slice(0, maxLength) + '...';
        }

        // ===== 渲染文章列表 =====
        function renderPosts(posts) {
            const container = document.getElementById('post-container');
            if (posts.length === 0) {
                container.innerHTML = '<li class="no-results">没有找到匹配的文章 📭</li>';
                return;
            }
            container.innerHTML = '';
            posts.forEach(issue => {
                const date = new Date(issue.created_at).toLocaleDateString('zh-CN', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
                const excerpt = getExcerpt(issue.body, 100);
                const tags = (issue.labels || [])
                    .map(l => `<span class="post-tag">${l.name}</span>`)
                    .join('');

                const li = document.createElement('li');
                li.className = 'post-item';
                li.innerHTML = `
                    <div class="post-meta">
                        <span class="post-date">${date}</span>
                        ${tags ? `<div class="post-tags">${tags}</div>` : ''}
                    </div>
                    <a href="post.html?id=${issue.number}" class="post-title-link">${issue.title}</a>
                    ${excerpt ? `<div class="post-excerpt">${excerpt}</div>` : ''}
                `;
                container.appendChild(li);
            });
        }

        // ===== 渲染标签过滤 =====
        function renderTagFilter() {
            const tagSet = new Set();
            allIssues.forEach(issue => {
                (issue.labels || []).forEach(l => tagSet.add(l.name));
            });
            const container = document.getElementById('tag-filter');
            const tags = Array.from(tagSet).sort();

            let html = `<button class="tag-filter-btn ${activeTag === '' ? 'active' : ''}" data-tag="">全部</button>`;
            tags.forEach(tag => {
                html += `<button class="tag-filter-btn ${activeTag === tag ? 'active' : ''}" data-tag="${tag}">${tag}</button>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('.tag-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeTag = btn.dataset.tag;
                    applyFilters();
                });
            });
        }

        // ===== 应用过滤 =====
        function applyFilters() {
            let issues = [...allIssues];
            if (activeTag) {
                issues = issues.filter(i =>
                    (i.labels || []).some(l => l.name === activeTag)
                );
            }
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                issues = issues.filter(i =>
                    (i.title || '').toLowerCase().includes(q) ||
                    (i.body || '').toLowerCase().includes(q)
                );
            }
            filteredIssues = issues;
            totalPages = Math.ceil(filteredIssues.length / PAGE_SIZE);
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
            changePage(currentPage);
        }

        // ===== 渲染分页控件 =====
        function renderPagination() {
            const container = document.getElementById('pagination-container');
            container.innerHTML = '';
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.textContent = '← 上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => changePage(currentPage - 1);
            container.appendChild(prevBtn);

            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => changePage(i);
                container.appendChild(btn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.textContent = '下一页 →';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => changePage(currentPage + 1);
            container.appendChild(nextBtn);
        }

        // ===== 切换页码 =====
        function changePage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            renderPosts(filteredIssues.slice(start, end));
            renderPagination();
            document.getElementById('post-container').scrollIntoView({ behavior: 'smooth' });
        }

        // ===== 搜索 =====
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            currentPage = 1;
            applyFilters();
        });

        // ===== 获取所有文章 =====
        async function fetchAllPosts() {
            // 尝试读取缓存
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_DURATION) {
                        allIssues = data;
                        renderSidebar();
                        renderTagFilter();
                        applyFilters();
                        console.log('✅ 从缓存加载文章');
                        return;
                    }
                }
            } catch (e) { /* 忽略缓存错误 */ }

            const container = document.getElementById('post-container');
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues?state=all&per_page=100`,
                    { headers: { 'Accept': 'application/vnd.github.v3+json' } }
                );
                if (!response.ok) throw new Error(`请求失败：${response.status}`);
                let issues = await response.json();

                // 过滤掉 PR
                allIssues = issues.filter(i => !i.pull_request);

                // 缓存
                try {
                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        data: allIssues,
                        timestamp: Date.now()
                    }));
                } catch (e) { /* 忽略存储错误 */ }

                renderSidebar();
                renderTagFilter();
                applyFilters();
            } catch (error) {
                console.error('加载文章失败：', error);
                container.innerHTML = `<li class="loading">文章加载失败：${error.message}，请刷新重试</li>`;
            }
        }

        // ===== 渲染侧边栏 =====
        function renderSidebar() {
            // 获取 GitHub 用户信息
            fetch(`https://api.github.com/users/${GITHUB_USERNAME}`)
                .then(r => r.json())
                .then(user => {
                    if (user.avatar_url) document.getElementById('avatar').src = user.avatar_url;
                    if (user.name) document.getElementById('sidebar-name').textContent = user.name || user.login;
                    if (user.location) document.getElementById('location').textContent = user.location;
                })
                .catch(() => {
                    document.getElementById('avatar').src = `https://avatars.githubusercontent.com/${GITHUB_USERNAME}`;
                    document.getElementById('sidebar-name').textContent = GITHUB_USERNAME;
                });
        }

        // ===== 页面加载 =====
        window.addEventListener('DOMContentLoaded', fetchAllPosts);
    </script>
</body>
</html>
