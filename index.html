<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>中国象棋AI对弈</title>

<style>
body{
    font-family:微软雅黑;
    text-align:center;
    background:#f5e6c8;
}

h1{
    color:#c00;
}

#board{
    margin:auto;
    display:grid;
    grid-template-columns:repeat(9,70px);
    grid-template-rows:repeat(10,70px);
    width:630px;
    border:3px solid #333;
    background:#f8d98a;
}

.cell{
    border:1px solid #666;
    position:relative;
}

.piece{
    width:56px;
    height:56px;
    border-radius:50%;
    line-height:56px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    position:absolute;
    left:6px;
    top:6px;
    cursor:pointer;
    user-select:none;
}

.red{
    background:#fff0f0;
    color:red;
    border:2px solid red;
}

.black{
    background:#eee;
    color:black;
    border:2px solid black;
}

.selected{
    box-shadow:0 0 10px #00f;
}

#msg{
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>中国象棋 AI 对弈</h1>

<div id="board"></div>

<div id="msg">
红方先行
</div>

<script>

const boardElement=document.getElementById("board");
const msg=document.getElementById("msg");

let selected=null;

const initialBoard=[
['r','m','e','a','k','a','e','m','r'],
['','','','','','','','',''],
['','c','','','','','','c',''],
['p','','p','','p','','p','','p'],
['','','','','','','','',''],
['','','','','','','','',''],
['P','','P','','P','','P','','P'],
['','C','','','','','','C',''],
['','','','','','','','',''],
['R','M','E','A','K','A','E','M','R']
];

let board=JSON.parse(JSON.stringify(initialBoard));

const pieceMap={
R:'车',M:'马',E:'相',A:'仕',K:'帅',C:'炮',P:'兵',
r:'车',m:'马',e:'象',a:'士',k:'将',c:'炮',p:'卒'
};

function drawBoard(){

boardElement.innerHTML='';

for(let r=0;r<10;r++){

for(let c=0;c<9;c++){

const cell=document.createElement('div');
cell.className='cell';

cell.dataset.row=r;
cell.dataset.col=c;

cell.onclick=()=>cellClick(r,c);

let p=board[r][c];

if(p){

const piece=document.createElement('div');

piece.className='piece '+(
p===p.toUpperCase()?'red':'black'
);

piece.innerText=pieceMap[p];

if(selected &&
selected.row===r &&
selected.col===c){

piece.classList.add('selected');

}

cell.appendChild(piece);

}

boardElement.appendChild(cell);

}
}

}

function isRed(piece){
return piece===piece.toUpperCase();
}

function cellClick(r,c){

let piece=board[r][c];

if(selected==null){

if(piece && isRed(piece)){

selected={row:r,col:c};

drawBoard();

}

return;
}

let sr=selected.row;
let sc=selected.col;

let sp=board[sr][sc];

if(canMove(sr,sc,r,c,sp)){

board[r][c]=sp;
board[sr][sc]='';

selected=null;

drawBoard();

setTimeout(aiMove,300);

}else{

selected=null;
drawBoard();

}

}

function canMove(sr,sc,tr,tc,p){

if(sr===tr && sc===tc)
return false;

let target=board[tr][tc];

if(target){

if(isRed(target)===isRed(p))
return false;
}

let dr=tr-sr;
let dc=tc-sc;

switch(p.toUpperCase()){

case 'R':
if(dr!==0 && dc!==0) return false;

if(dr===0){

let step=dc>0?1:-1;

for(let c=sc+step;c!==tc;c+=step)
if(board[sr][c]) return false;

}else{

let step=dr>0?1:-1;

for(let r=sr+step;r!==tr;r+=step)
if(board[r][sc]) return false;

}

return true;

case 'M':

if(!(
(Math.abs(dr)==2&&Math.abs(dc)==1)
||
(Math.abs(dr)==1&&Math.abs(dc)==2)
))
return false;

return true;

case 'C':

if(dr!==0 && dc!==0)
return false;

let count=0;

if(dr===0){

let step=dc>0?1:-1;

for(let c=sc+step;c!==tc;c+=step)
if(board[sr][c]) count++;

}else{

let step=dr>0?1:-1;

for(let r=sr+step;r!==tr;r+=step)
if(board[r][sc]) count++;

}

if(target)
return count===1;

return count===0;

case 'P':

if(isRed(p)){

if(dr==-1 && dc==0) return true;

if(sr<=4 &&
Math.abs(dc)==1 &&
dr==0) return true;

}else{

if(dr==1 && dc==0) return true;

if(sr>=5 &&
Math.abs(dc)==1 &&
dr==0) return true;

}

return false;

default:
return Math.abs(dr)<=1 &&
Math.abs(dc)<=1;

}

}

function evaluate(){

const scoreMap={
K:10000,
R:500,
M:300,
C:300,
P:100,
A:50,
E:50
};

let score=0;

for(let r=0;r<10;r++){

for(let c=0;c<9;c++){

let p=board[r][c];

if(!p) continue;

let v=scoreMap[p.toUpperCase()]||0;

if(isRed(p))
score-=v;
else
score+=v;

}
}

return score;

}

function generateMoves(sideBlack=true){

let moves=[];

for(let r=0;r<10;r++){

for(let c=0;c<9;c++){

let p=board[r][c];

if(!p) continue;

if(sideBlack!==(!isRed(p)))
continue;

for(let tr=0;tr<10;tr++){

for(let tc=0;tc<9;tc++){

if(canMove(r,c,tr,tc,p)){

moves.push({
sr:r,
sc:c,
tr,
tc
});

}

}
}

}
}

return moves;

}

function aiMove(){

let bestScore=-999999;
let bestMove=null;

let moves=generateMoves(true);

for(let move of moves){

let captured=
board[move.tr][move.tc];

let piece=
board[move.sr][move.sc];

board[move.tr][move.tc]=piece;
board[move.sr][move.sc]='';

let score=evaluate();

board[move.sr][move.sc]=piece;
board[move.tr][move.tc]=captured;

if(score>bestScore){

bestScore=score;
bestMove=move;

}

}

if(bestMove){

board[bestMove.tr][bestMove.tc]=
board[bestMove.sr][bestMove.sc];

board[bestMove.sr][bestMove.sc]='';

}

drawBoard();

msg.innerHTML="AI已走棋";

}

drawBoard();

</script>

</body>
</html>
