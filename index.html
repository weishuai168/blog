<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>laowei</title>
    <style>
        /* 全局样式 */
        :root {
            --primary-color: #2563eb;
            --text-color: #1f2937;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        /* 左侧侧边栏 */
        .sidebar {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e5e7eb url('https://via.placeholder.com/120') center/cover;
            margin: 0 auto 20px;
            display: block;
            border: 3px solid var(--primary-color);
        }

        .name {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .tag {
            text-align: center;
            color: var(--primary-color);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 4px 12px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 20px;
            display: inline-block;
        }

        .info-list {
            list-style: none;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .info-list li {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }

        .info-list li span:first-child {
            color: #6b7280;
        }

        .info-list li a {
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.2s;
        }

        .info-list li a:hover {
            text-decoration: underline;
        }

        /* 左侧模块标题 */
        .sidebar-title {
            font-size: 16px;
            font-weight: bold;
            margin: 25px 0 12px 0;
            color: var(--primary-color);
        }

        /* 左侧关于我 + 工作经历 */
        .sidebar-desc {
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .sidebar-job {
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        /* 右侧主内容区 */
        main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* 文章列表样式 */
        .post-list {
            list-style: none;
        }

        .post-item {
            padding: 15px 0;
            border-bottom: 1px solid #f3f4f6;
            transition: background 0.2s;
            padding-left: 8px;
            border-left: 2px solid transparent;
        }

        .post-item:hover {
            background: rgba(37, 99, 235, 0.05);
            border-left: 2px solid var(--primary-color);
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-title {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: color 0.2s;
            display: block;
            margin-top: 4px;
        }

        .post-title:hover {
            color: var(--primary-color);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 0.9rem;
        }

        /* 分页样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination-btn:disabled {
            background: var(--bg-color);
            color: #9ca3af;
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        .pagination-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 15px;
            }
            .sidebar {
                position: relative;
                top: 0;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 左侧：个人信息 + 关于我 + 工作经历 -->
        <div class="sidebar">
            <div class="profile-img"></div>
            <h1 class="name">张三</h1>
            <div class="tag">前端开发工程师</div>

            <ul class="info-list">
                <li><span>📍 城市</span><span>北京</span></li>
                <li><span>📧 邮箱</span><span>test@example.com</span></li>
                <li><span>💻 GitHub</span><span><a href="https://github.com/weishuai168" target="_blank">weishuai168</a></span></li>
            </ul>

            <!-- 关于我（移到左侧 + 可点击跳转） -->
            <div class="sidebar-title">👉 关于我</div>
            <div class="sidebar-desc">
                热爱前端、热爱开源，专注 Web 开发与技术分享。
            </div>
            <a href="about.html" style="color:var(--primary-color);font-size:14px;">查看完整介绍 →</a>

            <!-- 工作经历（移到左侧 + 可点击跳转） -->
            <div class="sidebar-title" style="margin-top:25px;">👉 工作经历</div>
            <div class="sidebar-job">
                高级前端工程师 | 3年前端开发经验
            </div>
            <a href="work.html" style="color:var(--primary-color);font-size:14px;">查看完整履历 →</a>
        </div>

        <!-- 右侧：只保留 文章列表（移到顶部） -->
        <main>
            <section class="card">
                <h2>近期文章</h2>
                <ul class="post-list" id="post-container">
                    <li class="loading">正在加载文章列表...</li>
                </ul>
                <!-- 分页容器 -->
                <div class="pagination" id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script>
        // GitHub 信息（改成你自己的）
        const GITHUB_USERNAME = 'weishuai168';
        const REPO_NAME = 'blog';
        // 分页配置
        const PAGE_SIZE = 10; // 每页显示数量
        let currentPage = 1; // 当前页
        let totalPages = 1;  // 总页数
        let allIssues = [];   // 所有文章数据

        // 渲染文章列表
        function renderPosts(posts) {
            const container = document.getElementById('post-container');
            if (posts.length === 0) {
                container.innerHTML = '<li class="loading">暂无文章</li>';
                return;
            }
            container.innerHTML = '';
            posts.forEach(issue => {
                const date = new Date(issue.created_at).toISOString().split('T')[0];
                const li = document.createElement('li');
                li.className = 'post-item';
                // 跳转到独立文章页
                li.innerHTML = `
                    <div class="time">${date}</div>
                    <a href="post.html?id=${issue.number}" class="post-title">${issue.title}</a>
                `;
                container.appendChild(li);
            });
        }

        // 渲染分页控件
        function renderPagination() {
            const paginationContainer = document.getElementById('pagination-container');
            paginationContainer.innerHTML = '';

            // 上一页按钮
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.textContent = '上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => changePage(currentPage - 1);
            paginationContainer.appendChild(prevBtn);

            // 页码按钮（只显示当前页前后2个页码，避免页码过多）
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => changePage(i);
                paginationContainer.appendChild(pageBtn);
            }

            // 下一页按钮
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.textContent = '下一页';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => changePage(currentPage + 1);
            paginationContainer.appendChild(nextBtn);
        }

        // 切换页码
        function changePage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            // 计算当前页要显示的文章
            const startIndex = (currentPage - 1) * PAGE_SIZE;
            const endIndex = startIndex + PAGE_SIZE;
            const currentPosts = allIssues.slice(startIndex, endIndex);
            // 重新渲染列表和分页
            renderPosts(currentPosts);
            renderPagination();
            // 滚动到文章列表顶部
            document.getElementById('post-container').scrollIntoView({ behavior: 'smooth' });
        }

        // 获取所有文章数据
        async function fetchAllPosts() {
            const container = document.getElementById('post-container');
            try {
                // 注意：GitHub API 默认最多返回30条，添加per_page=100获取更多（最大100）
                // 如果文章超过100条，需要循环请求page参数，这里简化处理
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/issues?state=open&per_page=100`, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' }
                });

                if (!response.ok) throw new Error(`请求失败：${response.status}`);
                const issues = await response.json();
                // 过滤掉PR，只保留普通issue（文章）
                allIssues = issues.filter(issue => !issue.pull_request);
                // 计算总页数
                totalPages = Math.ceil(allIssues.length / PAGE_SIZE);
                // 渲染第一页
                changePage(1);
            } catch (error) {
                console.error('加载文章失败：', error);
                container.innerHTML = `<li class="loading">文章加载失败：${error.message}</li>`;
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', fetchAllPosts);
    </script>
</body>
</html>
